<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate — Archive Studios</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="page-home page-activate">
  <div class="ambient" aria-hidden="true"></div>
  <header class="topbar">
    <a href="/" class="brand">
      <span class="brand-mark">AS</span>
      <span class="brand-text">Archive <em>Studios</em></span>
    </a>
  </header>
  <main class="hero">
    <section class="studio-card" style="max-width: 480px; margin: 2rem auto;">
      <div class="card-head">
        <h2>Activate your license</h2>
        <p>Enter the license key from your Gumroad receipt email. We verify once online, then this app runs fully offline.</p>
      </div>
      <label class="field">
        <span>License key</span>
        <input type="text" id="license-key" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
      </label>
      <div class="card-actions">
        <button type="button" class="btn primary" id="btn-verify">Verify license</button>
      </div>
      <p id="activate-msg" class="drop-hint" style="margin-top: 1rem;"></p>
    </section>
  </main>
  <script>
    const btn = document.getElementById('btn-verify');
    const input = document.getElementById('license-key');
    const msg = document.getElementById('activate-msg');
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      msg.textContent = 'Verifying…';
      msg.style.color = '';
      try {
        const res = await fetch('/api/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license_key: input.value.trim() }),
        });
        const data = await res.json();
        if (data.ok) {
          msg.style.color = 'var(--success)';
          msg.textContent = data.message || 'Activated! Redirecting…';
          setTimeout(() => { window.location.href = '/'; }, 1200);
        } else {
          msg.style.color = 'var(--danger)';
          msg.textContent = data.error || 'Verification failed.';
          btn.disabled = false;
        }
      } catch (e) {
        msg.style.color = 'var(--danger)';
        msg.textContent = 'Network error. Check your connection and try again.';
        btn.disabled = false;
      }
    });
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
